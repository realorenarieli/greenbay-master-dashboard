<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greenbay — Investor Intelligence Deck</title>
  <meta name="description" content="Greenbay Investor Intelligence Deck: Market opportunity, unit economics, growth trajectory, and competitive positioning." />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Dependencies: React -> PropTypes -> ReactDOM -> Recharts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050B18; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #050B18; color: #00d4aa;
      font-family: monospace; font-size: 13px; gap: 16px; z-index: 999;
    }
    .spinner {
      width: 36px; height: 36px; border: 2px solid #1a2e4a;
      border-top-color: #00d4aa; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-msg {
      display: none; color: #ff6b6b; font-family: monospace;
      font-size: 12px; padding: 20px; max-width: 600px; text-align: center;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <span id="load-status">Loading dashboard…</span>
    <span id="error-msg"></span>
  </div>
  <div id="root"></div>

  <script>
    var missing = [];
    if (!window.React)    missing.push('React');
    if (!window.ReactDOM) missing.push('ReactDOM');
    if (!window.Recharts) missing.push('Recharts');
    if (missing.length) {
      document.getElementById('load-status').textContent = 'Failed to load: ' + missing.join(', ');
      document.getElementById('error-msg').style.display = 'block';
      document.getElementById('error-msg').textContent = 'Please refresh the page or check your internet connection.';
    }
  </script>
  <script>
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', 'data/canonical-bundle.json', false);
      xhr.send();
      if (xhr.status === 200) {
        window.__GREENBAY_CANONICAL__ = JSON.parse(xhr.responseText);
      }
    } catch (e) {
      console.warn('Canonical bundle not available:', e.message);
    }
  </script>
  <script src="dashboard.js"></script>
</body>
</html>
